services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    image: llm-telegram-bot:latest
    container_name: llm-telegram-bot
    env_file:
      - .env
    restart: unless-stopped
    init: true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
